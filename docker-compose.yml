version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: streamforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge
      POSTGRES_DB: streamforge_db
    volumes:
      - pgdata:/var/lib/postgresql/data
  mongo:
    image: mongo:6
    container_name: streamforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: streamforge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: streamforge-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7
    container_name: streamforge-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: streamforge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    

volumes:
  pgdata:
  mongodata:
